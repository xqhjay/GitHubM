<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 相对路径：确保在 WebView file:// 协议下也能正确加载图标 -->
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <link rel="apple-touch-icon" href="./logo.svg" />

    <!-- WebView / PWA 视口：关闭用户缩放，支持刘海屏安全区 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- 主题色（Android WebView 工具栏 / PWA 标题栏） -->
    <meta name="theme-color" content="#1e1b4b" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f3ff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1e1b4b" />

    <!-- iOS PWA / WKWebView 全屏模式 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GitHub 管理器" />

    <!-- Android WebView / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GitHub 管理器" />

    <!-- SEO & 分享描述 -->
    <meta name="description" content="一站式移动管理 GitHub，随时随地管理仓库、Issue、PR，高效便捷的开发者利器。" />

    <title>GitHub 管理器</title>

    <!--
      主题预初始化脚本：在任何 CSS/JS 加载前同步执行，
      避免首屏出现错误主题（FOUC）和安卓状态栏色与页面不匹配的问题。
      1. 读取 localStorage 存储的主题偏好
      2. 若为 system / 未设置，读取系统 prefers-color-scheme
      3. 立即为 <html> 添加正确的 dark/light class
      4. 动态更新 theme-color meta，让安卓 WebView 状态栏与强调色同步
      5. 尝试通知 AndroidBridge（壳注入可能略晚于脚本执行，降级处理）
    -->
    <script>
      (function () {
        // ── 强调色映射表（与 ThemeContext.tsx ACCENT_SCHEMES 保持同步） ──
        var ACCENT_COLORS = {
          purple:  { dark: '#7c3aed', light: '#6d28d9' },
          blue:    { dark: '#1d6be3', light: '#1d4ed8' },
          green:   { dark: '#16a34a', light: '#15803d' },
          orange:  { dark: '#f97316', light: '#ea580c' },
          rose:    { dark: '#e11d48', light: '#be123c' },
          cyan:    { dark: '#0891b2', light: '#0e7490' },
          indigo:  { dark: '#4f46e5', light: '#4338ca' },
          sky:     { dark: '#0ea5e9', light: '#0284c7' },
          emerald: { dark: '#059669', light: '#047857' },
          teal:    { dark: '#0d9488', light: '#0f766e' },
          amber:   { dark: '#d97706', light: '#b45309' },
          pink:    { dark: '#ec4899', light: '#db2777' },
          violet:  { dark: '#8b5cf6', light: '#7c3aed' },
          gold:    { dark: '#ca8a04', light: '#a16207' },
          coral:   { dark: '#f0572a', light: '#d94420' },
          lime:    { dark: '#65a30d', light: '#4d7c0f' },
        };

        var saved = localStorage.getItem('github_manager_theme');
        var isDark;
        if (saved === 'light') {
          isDark = false;
        } else if (saved === 'system') {
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        } else {
          // 'dark' 或未设置（首次使用默认深色）
          isDark = true;
        }

        // 同步写入 html class，不等待 React
        var html = document.documentElement;
        if (isDark) {
          html.classList.add('dark');
          html.classList.remove('light');
        } else {
          html.classList.add('light');
          html.classList.remove('dark');
        }

        // 读取已保存的强调色，更新 theme-color meta
        var accentId = localStorage.getItem('github_manager_accent') || 'purple';
        var accentEntry = ACCENT_COLORS[accentId] || ACCENT_COLORS.purple;
        var accentHex = isDark ? accentEntry.dark : accentEntry.light;

        var metaThemeColor = document.querySelector('meta[name="theme-color"]:not([media])');
        if (metaThemeColor) {
          metaThemeColor.setAttribute('content', accentHex);
        }

        // 同步更新 favicon 为当前强调色，避免首屏闪烁紫色
        (function updateFavicon(hex) {
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 16 16">' +
            '<path fill="' + hex + '" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59c.4.07.55-.17.55-.38c0-.19-.01-.82-.01-1.49c-2.01.37-2.53-.49-2.69-.94c-.09-.23-.48-.94-.82-1.13c-.28-.15-.68-.52-.01-.53c.63-.01 1.08.58 1.23.82c.72 1.21 1.87.87 2.33.66c.07-.52.28-.87.51-1.07c-1.78-.2-3.64-.89-3.64-3.95c0-.87.31-1.59.82-2.15c-.08-.2-.36-1.02.08-2.12c0 0 .67-.21 2.2.82c.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82c.44 1.1.16 1.92.08 2.12c.51.56.82 1.27.82 2.15c0 3.07-1.87 3.75-3.65 3.95c.29.25.54.73.54 1.48c0 1.07-.01 1.93-.01 2.2c0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/></svg>';
          var dataUri = 'data:image/svg+xml;base64,' + btoa(svg);
          var link = document.querySelector('link[rel*="icon"]') || document.querySelector('link[rel="shortcut icon"]');
          if (link) {
            link.type = 'image/svg+xml';
            link.href = dataUri;
          }
          var appleLink = document.querySelector('link[rel="apple-touch-icon"]');
          if (appleLink) {
            appleLink.href = dataUri;
          }
        })(accentHex);

        // 通知 AndroidBridge（壳注入后立即可用；若未注入则静默忽略）
        try {
          if (window.AndroidBridge) {
            window.AndroidBridge.notifyTheme && window.AndroidBridge.notifyTheme(isDark);
            window.AndroidBridge.notifyAccent && window.AndroidBridge.notifyAccent(accentHex);
            window.AndroidBridge.notifyAccentIcon && window.AndroidBridge.notifyAccentIcon(accentHex);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
